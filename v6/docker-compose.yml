version: "3.9"

services:

  # ── Backend Express (port 3001) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app          # hot reload : vos fichiers → conteneur
      - /app/node_modules       # évite d'écraser node_modules du conteneur
    environment:
      - PORT=3001
      - NODE_ENV=development
      # MONGO_URI est dans ./backend/.env (MongoDB Atlas)
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # ── Frontend React / Vite (port 5173) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # hot reload
      - /app/node_modules
    environment:
      # Permet au proxy Vite de résoudre "backend" dans le réseau Docker
      - VITE_BACKEND_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped
