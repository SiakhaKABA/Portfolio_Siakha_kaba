version: "3.9"

services:

  # ── MongoDB (non exposé en prod) ───────────────────────
  mongo:
    image: mongo:7
    container_name: portfolio_mongo
    volumes:
      - mongo_data:/data/db
    restart: always

  # ── Backend Express ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: portfolio_backend
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/portfolio
      - NODE_ENV=production
    env_file:
      - ./backend/.env          # JWT_SECRET + ADMIN_PASSWORD_HASH
    depends_on:
      - mongo
    restart: always

  # ── Frontend via Nginx (port 80) ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: portfolio_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
